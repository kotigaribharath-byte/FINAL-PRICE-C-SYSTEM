<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search History</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .history-wrapper {
            width: 90%;
            margin: 40px auto;
            color: white;
            text-align: center;
        }

        .history-title {
            font-size: 42px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .history-subtitle {
            font-size: 18px;
            color: #cbd5e1;
            margin-bottom: 25px;
        }

        .top-buttons {
            margin-bottom: 25px;
        }

        .top-buttons a {
            display: inline-block;
            margin: 0 8px;
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 10px;
            background: linear-gradient(90deg, #3b82f6, #7c3aed);
            color: white;
            font-weight: 600;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255,255,255,0.08);
            color: white;
            border-radius: 14px;
            overflow: hidden;
        }

        thead {
            background: rgba(99,102,241,0.45);
        }

        th, td {
            padding: 14px;
            text-align: center;
        }

        tr {
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
    </style>
</head>
<body>
    <div class="history-wrapper">
        <div class="history-title">Search History</div>
        <div class="history-subtitle">All searched product names</div>

        <div class="top-buttons">
            <a href="/admin/dashboard">Dashboard</a>
            <a href="/">Home</a>
            <a href="/admin/logout">Logout</a>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Search Name</th>
                    </tr>
                </thead>
                <tbody>
                    {% for item in searches %}
                    <tr>
                        <td>{{ item.id }}</td>
                        <td>{{ item.search_name }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
